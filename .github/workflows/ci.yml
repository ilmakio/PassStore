name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  unsigned-macos-verification:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build for testing (unsigned)
        run: |
          xcodebuild build-for-testing \
            -project PassStore.xcodeproj \
            -scheme PassStore \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=''

      - name: Run unit tests (unsigned)
        run: |
          xcodebuild test-without-building \
            -project PassStore.xcodeproj \
            -scheme PassStore \
            -destination 'platform=macOS' \
            -only-testing:PassStoreTests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=''
